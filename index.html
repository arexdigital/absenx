<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Absensi Karyawan</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 520px;
      margin: auto;
      padding: 16px;
      background: #f5f5f5;
    }

    .card {
      background: white;
      padding: 16px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    input, select, button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 16px;
      box-sizing: border-box;
    }

    button {
      border: none;
      background: #1a73e8;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    button.secondary {
      background: #444;
    }

    button.danger {
      background: #d93025;
    }

    video, canvas, img {
      width: 100%;
      margin-top: 12px;
      border-radius: 12px;
      background: #000;
    }

    .info {
      font-size: 14px;
      margin-top: 10px;
      color: #333;
      line-height: 1.5;
    }

    .success {
      color: green;
      font-weight: bold;
    }

    .error {
      color: red;
      font-weight: bold;
    }
  </style>
</head>

<body>
  <div class="card">
    <h2>Absensi Karyawan</h2>

    <input type="text" id="nama" placeholder="Nama karyawan" />
    <input type="text" id="nik" placeholder="NIK / ID karyawan" />

    <select id="tipe">
      <option value="MASUK">Absen Masuk</option>
      <option value="PULANG">Absen Pulang</option>
    </select>

    <button onclick="ambilLokasi()">Ambil Lokasi GPS</button>
    <div class="info" id="gpsInfo">GPS belum diambil.</div>

    <button onclick="bukaKamera()">Buka Kamera</button>
    <video id="video" autoplay playsinline></video>

    <button class="secondary" onclick="ambilFoto()">Ambil Foto</button>
    <canvas id="canvas" style="display:none;"></canvas>
    <img id="preview" alt="Preview foto" style="display:none;" />

    <button onclick="kirimAbsensi()">Kirim Absensi</button>
    <button class="danger" onclick="resetForm()">Reset</button>

    <div class="info" id="status"></div>
  </div>

  <script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyQ87FZPp49PdqrJt22ZccKtK3ACgsp2GWdBMQ-AqwpMm_iuF5-3uphkug9zU-F4LhEfg/exec";

    const OFFICE_LAT = -7.334070094702493;
    const OFFICE_LNG = 112.78542927116439;
    const MAX_DISTANCE_METER = 100;

    let stream = null;
    let latitude = "";
    let longitude = "";
    let accuracy = "";
    let distanceMeter = "";
    let photoBase64 = "";

    const video = document.getElementById("video");
    const canvas = document.getElementById("canvas");
    const preview = document.getElementById("preview");
    const statusBox = document.getElementById("status");
    const gpsInfo = document.getElementById("gpsInfo");

    function setStatus(message, type = "") {
      statusBox.className = "info " + type;
      statusBox.innerHTML = message;
    }

    async function bukaKamera() {
      try {
        setStatus("Membuka kamera...");

        if (stream) {
          stream.getTracks().forEach(track => track.stop());
        }

        try {
          stream = await navigator.mediaDevices.getUserMedia({
            video: {
              facingMode: { ideal: "environment" },
              width: { ideal: 720 },
              height: { ideal: 720 }
            },
            audio: false
          });
        } catch (err) {
          stream = await navigator.mediaDevices.getUserMedia({
            video: true,
            audio: false
          });
        }

        video.srcObject = stream;
        setStatus("Kamera aktif. Silakan ambil foto.", "success");
      } catch (error) {
        setStatus("Kamera gagal dibuka: " + error.message, "error");
      }
    }

    function ambilLokasi() {
      if (!navigator.geolocation) {
        setStatus("Browser tidak mendukung GPS.", "error");
        return;
      }

      setStatus("Mengambil lokasi GPS...");

      navigator.geolocation.getCurrentPosition(
        position => {
          latitude = position.coords.latitude;
          longitude = position.coords.longitude;
          accuracy = position.coords.accuracy;

          distanceMeter = hitungJarakMeter(
            latitude,
            longitude,
            OFFICE_LAT,
            OFFICE_LNG
          );

          gpsInfo.innerHTML = `
            Latitude: ${latitude}<br>
            Longitude: ${longitude}<br>
            Akurasi: ±${Math.round(accuracy)} meter<br>
            Jarak dari kantor: ${Math.round(distanceMeter)} meter
          `;

          if (distanceMeter > MAX_DISTANCE_METER) {
            setStatus("Lokasi di luar radius kantor.", "error");
          } else {
            setStatus("Lokasi valid dalam radius kantor.", "success");
          }
        },
        error => {
          setStatus("GPS gagal: " + error.message, "error");
        },
        {
          enableHighAccuracy: true,
          timeout: 15000,
          maximumAge: 0
        }
      );
    }

    function ambilFoto() {
      if (!stream) {
        setStatus("Buka kamera dulu sebelum ambil foto.", "error");
        return;
      }

      const maxWidth = 720;
      const videoWidth = video.videoWidth;
      const videoHeight = video.videoHeight;

      if (!videoWidth || !videoHeight) {
        setStatus("Kamera belum siap. Coba tunggu sebentar.", "error");
        return;
      }

      const ratio = videoHeight / videoWidth;
      canvas.width = maxWidth;
      canvas.height = maxWidth * ratio;

      const ctx = canvas.getContext("2d");
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

      photoBase64 = canvas.toDataURL("image/jpeg", 0.75);

      preview.src = photoBase64;
      preview.style.display = "block";

      setStatus("Foto berhasil diambil.", "success");
    }

    async function kirimAbsensi() {
      const nama = document.getElementById("nama").value.trim();
      const nik = document.getElementById("nik").value.trim();
      const tipe = document.getElementById("tipe").value;

      if (!nama || !nik) {
        setStatus("Nama dan NIK wajib diisi.", "error");
        return;
      }

      if (!latitude || !longitude) {
        setStatus("Ambil lokasi GPS dulu.", "error");
        return;
      }

      if (!photoBase64) {
        setStatus("Ambil foto dulu.", "error");
        return;
      }

      if (distanceMeter > MAX_DISTANCE_METER) {
        setStatus("Absensi ditolak karena lokasi di luar radius.", "error");
        return;
      }

      const payload = {
        nama,
        nik,
        tipe,
        latitude,
        longitude,
        accuracy,
        distanceMeter: Math.round(distanceMeter),
        photoBase64,
        userAgent: navigator.userAgent,
        clientTime: new Date().toISOString()
      };

      setStatus("Mengirim absensi...");

      try {
        await submitViaHiddenForm(payload);
        setStatus("Absensi dikirim. Silakan cek Google Sheet.", "success");
      } catch (error) {
        setStatus("Gagal mengirim: " + error.message, "error");
      }
    }

    function submitViaHiddenForm(payload) {
      return new Promise((resolve, reject) => {
        if (!SCRIPT_URL || SCRIPT_URL.includes("PASTE_WEB_APP_URL_KAMU")) {
          reject(new Error("SCRIPT_URL belum diganti."));
          return;
        }

        const iframeName = "hiddenFrame_" + Date.now();

        const iframe = document.createElement("iframe");
        iframe.name = iframeName;
        iframe.style.display = "none";
        document.body.appendChild(iframe);

        const form = document.createElement("form");
        form.method = "POST";
        form.action = SCRIPT_URL;
        form.target = iframeName;
        form.style.display = "none";

        Object.keys(payload).forEach(key => {
          const input = document.createElement("input");
          input.type = "hidden";
          input.name = key;
          input.value = payload[key];
          form.appendChild(input);
        });

        document.body.appendChild(form);

        let submitted = false;

        iframe.onload = () => {
          if (submitted) {
            setTimeout(() => {
              form.remove();
              iframe.remove();
              resolve();
            }, 300);
          }
        };

        submitted = true;
        form.submit();

        setTimeout(() => {
          form.remove();
          iframe.remove();
          resolve();
        }, 6000);
      });
    }

    function hitungJarakMeter(lat1, lon1, lat2, lon2) {
      const R = 6371000;
      const dLat = toRad(lat2 - lat1);
      const dLon = toRad(lon2 - lon1);

      const a =
        Math.sin(dLat / 2) * Math.sin(dLat / 2) +
        Math.cos(toRad(lat1)) *
        Math.cos(toRad(lat2)) *
        Math.sin(dLon / 2) *
        Math.sin(dLon / 2);

      const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
      return R * c;
    }

    function toRad(value) {
      return value * Math.PI / 180;
    }

    function resetForm() {
      document.getElementById("nama").value = "";
      document.getElementById("nik").value = "";
      document.getElementById("tipe").value = "MASUK";

      latitude = "";
      longitude = "";
      accuracy = "";
      distanceMeter = "";
      photoBase64 = "";

      preview.src = "";
      preview.style.display = "none";
      gpsInfo.innerHTML = "GPS belum diambil.";
      setStatus("");

      if (stream) {
        stream.getTracks().forEach(track => track.stop());
        stream = null;
      }

      video.srcObject = null;
    }
  </script>
</body>
</html>
